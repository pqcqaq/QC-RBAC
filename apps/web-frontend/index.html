<!doctype html>
<html lang="zh-CN" data-app-ready="false">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#17384a" />
    <title>权限控制台</title>
    <style>
      :root {
        color-scheme: light;
        --boot-bg: #f4efe8;
        --boot-bg-soft: #efe8dc;
        --boot-accent: #17384a;
        --boot-line: rgba(23, 56, 74, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.82), transparent 34%),
          linear-gradient(180deg, var(--boot-bg) 0%, var(--boot-bg-soft) 100%);
        font-family: "Segoe UI Variable Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      body,
      #app {
        min-height: 100vh;
      }

      .boot-screen {
        position: fixed;
        inset: 0;
        z-index: 1900;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.84), transparent 32%),
          linear-gradient(180deg, var(--boot-bg) 0%, var(--boot-bg-soft) 100%);
        transition:
          opacity 0.36s ease,
          visibility 0.36s ease;
      }

      .boot-screen.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      .boot-loader {
        position: relative;
        display: grid;
        place-items: center;
        width: 96px;
        height: 96px;
      }

      .boot-loader__ring,
      .boot-loader__ring::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
      }

      .boot-loader__ring {
        border: 3px solid rgba(23, 56, 74, 0.1);
      }

      .boot-loader__ring::before {
        inset: -3px;
        border: 3px solid transparent;
        border-top-color: var(--boot-accent);
        border-right-color: var(--boot-accent);
        animation: bootSpin 0.8s linear infinite;
      }

      .boot-loader__dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--boot-accent);
        box-shadow: 0 0 0 12px rgba(23, 56, 74, 0.06);
        animation: bootPulse 1.2s ease-in-out infinite;
      }

      .boot-noscript {
        position: fixed;
        inset: auto 20px 20px;
        z-index: 2100;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--boot-line);
        background: rgba(255, 255, 255, 0.92);
        color: #17384a;
        font-size: 13px;
        line-height: 1.6;
      }

      @keyframes bootSpin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes bootPulse {
        0%,
        100% {
          opacity: 0.4;
          transform: scale(0.88);
        }

        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-boot-screen" class="boot-screen" role="status" aria-live="polite">
      <div class="boot-loader" aria-label="加载中">
        <div class="boot-loader__ring" aria-hidden="true"></div>
        <div class="boot-loader__dot" aria-hidden="true"></div>
      </div>
    </div>
    <noscript>
      <div class="boot-noscript">请启用 JavaScript 后重试。</div>
    </noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
